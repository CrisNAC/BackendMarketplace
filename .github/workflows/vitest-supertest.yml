name: Vitest + Supertest (Backend)

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
        DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/test_db
        DIRECT_URL_TEST: postgresql://postgres:postgres@localhost:5432/test_db
        NODE_ENV: test
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DIRECT_URL: ${{ secrets.DIRECT_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        SUPABASE_BUCKET_PRODUCTS: ${{ secrets.SUPABASE_BUCKET_PRODUCTS }}
        SUPABASE_BUCKET_USERS: ${{ secrets.SUPABASE_BUCKET_USERS }}
        SUPABASE_BUCKET_STORES: ${{ secrets.SUPABASE_BUCKET_STORES }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - run: npm install

      # Generar cliente de Prisma
      - run: npx prisma generate

      # Esperar a que Postgres esté listo
      - run: npx wait-on tcp:5432

      # Crear schema
      - run: npx prisma db push

      # Ejecutar tests con db real
      - run: npm run test:run

      # Ejecutar tests sin db real
      #- run: npm run test:ci